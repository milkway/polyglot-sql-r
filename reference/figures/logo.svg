<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 434 500" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">polyglotSQL</title>
  <desc id="logoDesc">Hexagonal package logo: a database cylinder encircled by two cyclic arrows, symbolizing SQL being translated between dialects, on a navy background with turquoise, blue and violet accents.</desc>
  <defs>
    <linearGradient id="hexFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101b33"/>
      <stop offset="1" stop-color="#0a1122"/>
    </linearGradient>
    <linearGradient id="hexRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="dbFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="arrowTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arrowBottom" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Hexagon border and face -->
  <polygon points="217,8 425.5,129 425.5,371 217,492 8.5,371 8.5,129"
           fill="url(#hexFill)" stroke="url(#hexRim)" stroke-width="13"
           stroke-linejoin="round"/>

  <!-- Translation cycle: two arrows around the database (circle r=132, c=(217,190)) -->
  <g stroke-linecap="round" fill="none">
    <path d="M 93 144.9 A 132 132 0 0 1 341 144.9" stroke="url(#arrowTop)" stroke-width="16"/>
    <path d="M 341 235.1 A 132 132 0 0 1 93 235.1" stroke="url(#arrowBottom)" stroke-width="16"/>
  </g>
  <!-- Arrowheads oriented along the arc tangents -->
  <polygon points="-8,-20 28,0 -8,20" fill="#3b82f6" transform="translate(341,144.9) rotate(70)"/>
  <polygon points="-8,-20 28,0 -8,20" fill="#3b82f6" transform="translate(93,235.1) rotate(250)"/>

  <!-- Database cylinder -->
  <g>
    <path d="M 142 148 v 96 a 75 26 0 0 0 150 0 v -96 z" fill="url(#dbFill)"/>
    <ellipse cx="217" cy="148" rx="75" ry="26" fill="#60a5fa"/>
    <path d="M 142 180 a 75 26 0 0 0 150 0" fill="none" stroke="#0a1122" stroke-width="7" stroke-linecap="round"/>
    <path d="M 142 212 a 75 26 0 0 0 150 0" fill="none" stroke="#0a1122" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Wordmark, kept clear of the lower hexagon edges -->
  <text x="217" y="382" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" letter-spacing="0.5"
        fill="#e6edf7">polyglot<tspan fill="#2dd4bf">SQL</tspan></text>
</svg>
